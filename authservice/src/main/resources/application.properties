spring.application.name=authservice
server.port=9000
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.security.oauth2.server.authorization=TRACE

auth.redirect-uri=${AUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/authservice}
auth.issuer=${AUTH_ISSUER_URI:http://127.0.0.1:9000}
