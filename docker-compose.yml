services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
    ports:
      - "3306:3306"
    volumes:
#      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
  orderservice:
    build: ./orderservice
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/orders_db
      SPRING_RABBITMQ_HOST: rabbitmq
  stockservice:
    build: ./stockservice
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stock_db
      SPRING_RABBITMQ_HOST: rabbitmq

volumes:
  mysql_data:
